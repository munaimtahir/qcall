services:
  web:
    build: .
    command: sh -c "until python manage.py migrate --noinput; do echo 'Database unavailable, retrying migrations...'; sleep 2; done && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "${QCALL_APP_PORT:-8040}:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      USE_SQLITE: "0"
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-1}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-1}
    depends_on:
      - db

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  caddy:
    image: caddy:2.8
    depends_on:
      - web
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
    volumes:
      - ./ops/caddy/Caddyfile.sample:/etc/caddy/Caddyfile:ro
      - static_volume:/srv/static:ro
      - media_volume:/srv/media:ro

volumes:
  postgres_data:
  static_volume:
  media_volume:
